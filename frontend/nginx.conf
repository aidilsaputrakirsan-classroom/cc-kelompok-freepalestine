# ============================================================
# Dashboard Telkom TREG 4 Kalimantan — Nginx config
# Production-ready (Modul 6 — Tugas Terstruktur Lead Frontend)
#
# Fitur:
#  - SPA routing untuk React Router (refresh di /revenue tidak 404)
#  - Gzip compression untuk aset teks
#  - Security headers (X-Frame-Options, X-Content-Type-Options, dll)
#  - Cache panjang untuk aset statis, no-cache untuk index.html
#  - Custom error pages (fallback ke index.html)
# ============================================================

# Gzip global config — diaktifkan untuk konten teks.
gzip             on;
gzip_vary        on;
gzip_min_length  1024;
gzip_comp_level  6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/ttf
    font/otf;

server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # -----------------------------------------------------
    # Security headers — berlaku untuk semua response
    # -----------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # -----------------------------------------------------
    # SPA routing — semua path unknown diarahkan ke
    # index.html supaya React Router bisa menanganinya.
    # -----------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------------------------------
    # Cache panjang untuk aset statis (filename-hashed oleh Vite).
    # -----------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -----------------------------------------------------
    # index.html TIDAK boleh di-cache supaya user selalu
    # dapat bundle terbaru setelah deploy ulang.
    # -----------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # -----------------------------------------------------
    # Fallback error pages — balik ke SPA supaya React
    # bisa menampilkan halaman 404 miliknya sendiri.
    # -----------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
