# CI Pipeline — Free Palestine (Modul 10)
# Trigger: push/PR ke main
# Jobs: test-backend + test-frontend → build-docker + integration-test → notify on failure
# CD: .github/workflows/cd.yml (DeployCC) — jalan setelah CI sukses di main

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # ← Bisa dijalankan manual dari tab GitHub Actions

# ==============================================
# CONCURRENCY GROUP
# Batalkan run lama di branch/PR yang sama saat
# ada push baru, hemat menit runner secara efisien.
# ==============================================
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================
  # JOB 1: Test Backend (Python/FastAPI)
  # ================================
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10   # ← Otomatis gagal jika melebihi 10 menit

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: telkom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-cov

      - name: 🧪 Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/telkom_test
          SECRET_KEY: test-secret-key-for-ci-pipeline-minimum-32
        run: |
          pytest test_main.py -v --cov --cov-report=term-missing

  # ================================
  # JOB 2: Test Frontend (React/Vitest)
  # ================================
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10   # ← Otomatis gagal jika melebihi 10 menit

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗️ Build frontend
        run: npm run build

  # ================================
  # JOB 3: Build Docker Images
  # ================================
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    timeout-minutes: 10   # ← Otomatis gagal jika melebihi 10 menit
    needs: [test-backend, test-frontend]    # Hanya jalan jika kedua test PASS

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build backend image
        run: docker build -t cloudapp-backend:ci ./backend

      - name: 🐳 Build frontend image
        run: docker build -t cloudapp-frontend:ci ./frontend

      - name: ✅ Build success
        run: |
          echo "✅ All Docker images built successfully!"
          docker images | grep cloudapp

  # ================================
  # JOB 4: Integration Tests (Modul 13 — microservices via gateway)
  # ================================
  integration-test:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [test-backend, test-frontend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Start microservices stack
        run: |
          docker compose -f docker-compose.microservices.yml up -d --build \
            auth-db dashboard-db auth-service dashboard-service gateway

      - name: ⏳ Wait for services
        run: |
          echo "Waiting for gateway and dependencies..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health \
              && curl -sf http://localhost:8080/health/auth \
              && curl -sf http://localhost:8080/health/dashboard; then
              echo "All health endpoints ready."
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, sleeping 10s..."
            sleep 10
          done
          echo "Services failed to become healthy in time."
          docker compose -f docker-compose.microservices.yml ps -a
          docker compose -f docker-compose.microservices.yml logs --tail=80
          exit 1

      - name: 🐍 Setup Python for integration tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🧪 Run integration tests
        env:
          GATEWAY_URL: http://localhost:8080
        run: |
          python -m pip install --upgrade pip
          pip install httpx pytest
          pytest tests/integration/ -v

      - name: 🛑 Stop services
        if: always()
        run: docker compose -f docker-compose.microservices.yml down -v

  # ================================
  # JOB 5: Notifikasi PR Comment (CI Gagal)
  # ================================
  notify-failure:
    name: 💬 Notify PR on Failure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Jalankan HANYA jika salah satu job gagal DAN ini adalah event Pull Request
    needs: [test-backend, test-frontend, build-docker, integration-test]
    if: >
      failure() &&
      github.event_name == 'pull_request'

    permissions:
      pull-requests: write   # Izin menulis komentar di PR

    steps:
      - name: 💬 Comment on PR about failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${{ github.run_id }}`;

            const jobStatus = {
              'test-backend':  '${{ needs.test-backend.result }}',
              'test-frontend': '${{ needs.test-frontend.result }}',
              'build-docker':  '${{ needs.build-docker.result }}',
              'integration-test': '${{ needs.integration-test.result }}',
            };

            const failedJobs = Object.entries(jobStatus)
              .filter(([, status]) => status === 'failure')
              .map(([name]) => `- ❌ \`${name}\``)
              .join('\n');

            const skippedJobs = Object.entries(jobStatus)
              .filter(([, status]) => status === 'skipped')
              .map(([name]) => `- ⏭️ \`${name}\` (skipped)`)
              .join('\n');

            const body = [
              '## ❌ CI Pipeline Gagal',
              '',
              `**Workflow run:** [Lihat detail di sini](${runUrl})`,
              `**Commit:** \`${{ github.sha }}\``,
              `**Branch:** \`${{ github.head_ref }}\``,
              '',
              '### Jobs yang gagal:',
              failedJobs || '_Tidak ada_',
              '',
              skippedJobs ? `### Jobs yang di-skip:\n${skippedJobs}` : '',
              '',
              '---',
              '_Pesan ini dibuat otomatis oleh CI Pipeline. Harap periksa log di atas dan perbaiki error sebelum merge._',
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body,
            });
