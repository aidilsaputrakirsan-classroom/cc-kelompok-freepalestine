# CI Pipeline — Free Palestine (Modul 10)
# Trigger: push/PR ke main
# Jobs: lint → test-backend + test-frontend (parallel) → build-docker → notify on failure
# CD: .github/workflows/cd.yml (DeployCC) — jalan setelah CI sukses di main

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # ← Bisa dijalankan manual dari tab GitHub Actions

# ==============================================
# CONCURRENCY GROUP
# Batalkan run lama di branch/PR yang sama saat
# ada push baru, hemat menit runner secara efisien.
# ==============================================
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================
  # JOB 1: Test Backend (Python/FastAPI)
  # ================================
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10   # ← Otomatis gagal jika melebihi 10 menit

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run tests with coverage
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=50

  # ================================
  # JOB 2: Test Frontend (React/Vitest)
  # ================================
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10   # ← Otomatis gagal jika melebihi 10 menit

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📥 Install dependencies
        # Hapus package-lock.json terlebih dahulu karena di-generate di Windows
        # sehingga tidak menyertakan optional binary Linux (@rollup/rollup-linux-x64-gnu).
        # Dengan menghapusnya, npm akan generate lock file baru sesuai platform CI (linux-x64).
        run: |
          rm -f package-lock.json
          npm install

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗️ Build frontend
        run: npm run build

  # ================================
  # JOB 3: Build Docker Images
  # ================================
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    timeout-minutes: 10   # ← Otomatis gagal jika melebihi 10 menit
    needs: [test-backend, test-frontend]    # Hanya jalan jika kedua test PASS

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build backend image
        run: docker build -t cloudapp-backend:ci ./backend

      - name: 🐳 Build frontend image
        run: docker build -t cloudapp-frontend:ci ./frontend

      - name: ✅ Build success
        run: |
          echo "✅ All Docker images built successfully!"
          docker images | grep cloudapp

  # ================================
  # JOB 4: Notifikasi PR Comment (CI Gagal)
  # ================================
  notify-failure:
    name: 💬 Notify PR on Failure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Jalankan HANYA jika salah satu job gagal DAN ini adalah event Pull Request
    needs: [test-backend, test-frontend, build-docker]
    if: >
      failure() &&
      github.event_name == 'pull_request'

    permissions:
      pull-requests: write   # Izin menulis komentar di PR

    steps:
      - name: 💬 Comment on PR about failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${{ github.run_id }}`;

            const jobStatus = {
              'test-backend':  '${{ needs.test-backend.result }}',
              'test-frontend': '${{ needs.test-frontend.result }}',
              'build-docker':  '${{ needs.build-docker.result }}',
            };

            const failedJobs = Object.entries(jobStatus)
              .filter(([, status]) => status === 'failure')
              .map(([name]) => `- ❌ \`${name}\``)
              .join('\n');

            const skippedJobs = Object.entries(jobStatus)
              .filter(([, status]) => status === 'skipped')
              .map(([name]) => `- ⏭️ \`${name}\` (skipped)`)
              .join('\n');

            const body = [
              '## ❌ CI Pipeline Gagal',
              '',
              `**Workflow run:** [Lihat detail di sini](${runUrl})`,
              `**Commit:** \`${{ github.sha }}\``,
              `**Branch:** \`${{ github.head_ref }}\``,
              '',
              '### Jobs yang gagal:',
              failedJobs || '_Tidak ada_',
              '',
              skippedJobs ? `### Jobs yang di-skip:\n${skippedJobs}` : '',
              '',
              '---',
              '_Pesan ini dibuat otomatis oleh CI Pipeline. Harap periksa log di atas dan perbaiki error sebelum merge._',
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body,
            });
