# CI Pipeline — Free Palestine (Modul 10)
# Trigger: push/PR ke main
# Jobs: lint → test-backend + test-frontend (parallel) → build-docker → notify on failure
# CD: .github/workflows/cd.yml (DeployCC) — jalan setelah CI sukses di main

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint (Ruff + ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check backend/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend lint
        run: npm run lint
        working-directory: frontend

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run pytest
        run: pytest backend/test_main.py -v

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Build frontend
        run: npm run build

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cloudapp-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t cloudapp-frontend:ci ./frontend

      - name: Build success
        run: docker images | grep cloudapp || true

  ci-notify-failure:
    name: Notify CI Failure
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend, build-docker]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      (needs.lint.result == 'failure' ||
       needs.test-backend.result == 'failure' ||
       needs.test-frontend.result == 'failure' ||
       needs.build-docker.result == 'failure')
    timeout-minutes: 5

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-failure-notify -->';
            const body = `${marker}
            ## CI Pipeline gagal

            Salah satu job gagal pada commit \`${context.sha.substring(0, 7)}\`.

            | Job | Status |
            |-----|--------|
            | Lint | ${{ needs.lint.result }} |
            | Test Backend | ${{ needs.test-backend.result }} |
            | Test Frontend | ${{ needs['test-frontend'].result }} |
            | Build Docker | ${{ needs['build-docker'].result }} |

            Buka tab **Actions** untuk log detail, perbaiki, lalu push ulang ke branch PR ini.
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
