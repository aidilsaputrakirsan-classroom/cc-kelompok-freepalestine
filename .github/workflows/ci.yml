# Week 10: CI Pipeline — GitHub Actions
# Trigger: push ke main/develop, atau PR ke main
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==================== BACKEND TEST ====================
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: telkom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/telkom_test
          SECRET_KEY: test-secret-key-for-ci-pipeline-minimum-32
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          ALLOWED_ORIGINS: http://localhost:3000
        run: pytest test_main.py -v

  # ==================== FRONTEND BUILD ====================
  build-frontend:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build

  # ==================== DOCKER BUILD ====================
  build-docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t telkom-backend ./backend

      - name: Build Frontend Image
        run: docker build -t telkom-frontend ./frontend
