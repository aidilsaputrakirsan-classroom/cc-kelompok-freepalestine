# Docker Compose — Microservices Architecture (Week 12)
# 6 containers: 2 DBs + Auth Service + Dashboard Service + Gateway + Frontend

services:
  # ==================== DATABASES ====================
  auth-db:
    image: postgres:16-alpine
    container_name: telkom-auth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: auth_db
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend-net

  dashboard-db:
    image: postgres:16-alpine
    container_name: telkom-dashboard-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: dashboard_db
    volumes:
      - dashboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend-net

  # ==================== MICROSERVICES ====================
  auth-service:
    build: ./services/auth-service
    container_name: telkom-auth-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@auth-db:5432/auth_db
      SECRET_KEY: super-secret-key-for-jwt-minimum-32-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8080"
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-net

  dashboard-service:
    build: ./services/dashboard-service
    container_name: telkom-dashboard-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@dashboard-db:5432/dashboard_db
      AUTH_SERVICE_URL: http://auth-service:8001
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8080"
    depends_on:
      dashboard-db:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - backend-net

  # ==================== API GATEWAY ====================
  gateway:
    build: ./services/gateway
    container_name: telkom-gateway
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - dashboard-service
    restart: unless-stopped
    networks:
      - backend-net
      - frontend-net

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    container_name: telkom-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - frontend-net

volumes:
  auth_pgdata:
    driver: local
  dashboard_pgdata:
    driver: local

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
