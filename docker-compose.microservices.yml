# Docker Compose — Microservices Architecture (Week 12–14)
# 6 containers: 2 DBs + Auth Service + Dashboard Service + Gateway + Frontend
#
# Dev hot-reload:
#   docker compose -f docker-compose.microservices.yml -f docker-compose.dev.yml up --build
#
# Production:
#   docker compose -f docker-compose.microservices.yml -f docker-compose.microservices.prod.yml up -d --build

x-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ==================== DATABASES ====================
  auth-db:
    image: postgres:16-alpine
    container_name: telkom-auth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: auth_db
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      <<: *json-logging
      options:
        max-size: "10m"
        max-file: "3"
        tag: "auth-db"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    networks:
      - backend-net

  dashboard-db:
    image: postgres:16-alpine
    container_name: telkom-dashboard-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: dashboard_db
    volumes:
      - dashboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      <<: *json-logging
      options:
        max-size: "10m"
        max-file: "3"
        tag: "dashboard-db"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    networks:
      - backend-net

  # ==================== MICROSERVICES ====================
  auth-service:
    build: ./services/auth-service
    container_name: telkom-auth-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@auth-db:5432/auth_db
      SECRET_KEY: super-secret-key-for-jwt-minimum-32-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8080"
      SERVICE_NAME: auth-service
      LOG_LEVEL: INFO
    depends_on:
      auth-db:
        condition: service_healthy
    logging:
      <<: *json-logging
      options:
        max-size: "10m"
        max-file: "3"
        tag: "auth-service"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    networks:
      - backend-net

  dashboard-service:
    build: ./services/dashboard-service
    container_name: telkom-dashboard-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@dashboard-db:5432/dashboard_db
      AUTH_SERVICE_URL: http://auth-service:8001
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8080"
      SERVICE_NAME: dashboard-service
      LOG_LEVEL: INFO
    depends_on:
      dashboard-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    logging:
      <<: *json-logging
      options:
        max-size: "10m"
        max-file: "3"
        tag: "dashboard-service"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    networks:
      - backend-net

  # ==================== API GATEWAY ====================
  gateway:
    build: ./services/gateway
    container_name: telkom-gateway
    ports:
      - "8080:80"
    depends_on:
      auth-service:
        condition: service_healthy
      dashboard-service:
        condition: service_healthy
    logging:
      <<: *json-logging
      options:
        max-size: "10m"
        max-file: "3"
        tag: "gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
    networks:
      - backend-net
      - frontend-net

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    container_name: telkom-frontend-ms
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy
    logging:
      <<: *json-logging
      options:
        max-size: "10m"
        max-file: "3"
        tag: "frontend-ms"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    networks:
      - frontend-net

volumes:
  auth_pgdata:
    driver: local
  dashboard_pgdata:
    driver: local

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
