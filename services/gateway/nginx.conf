# Week 12: API Gateway — Nginx Reverse Proxy
# Week 15: Rate Limiting & Security Headers

# Rate limiting zones (Week 15)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream auth_service {
    server auth-service:8001;
}

upstream dashboard_service {
    server dashboard-service:8002;
}

server {
    listen 80;
    server_name localhost;

    # Security Headers (Week 15)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" always;

    # Limit request body size
    client_max_body_size 10M;

    # ==================== AUTH ROUTES ====================
    # Rate limit lebih ketat untuk login (prevent brute force)
    location /auth/login {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $request_id;
    }

    location /auth/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $request_id;
    }

    # ==================== DASHBOARD ROUTES ====================
    location /sales/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://dashboard_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $request_id;
        proxy_set_header Authorization $http_authorization;
    }

    location /inbox/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://dashboard_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $request_id;
        proxy_set_header Authorization $http_authorization;
    }

    # ==================== HEALTH CHECKS ====================
    location /health/auth {
        proxy_pass http://auth_service/health;
    }

    location /health/dashboard {
        proxy_pass http://dashboard_service/health;
    }

    location /health {
        return 200 '{"status":"healthy","service":"gateway","version":"2.0.0"}';
        add_header Content-Type application/json;
    }

    # ==================== METRICS ====================
    location /metrics/auth {
        proxy_pass http://auth_service/metrics;
    }

    location /metrics/dashboard {
        proxy_pass http://dashboard_service/metrics;
    }

    # ==================== TEAM ====================
    location /team {
        proxy_pass http://auth_service/team;
    }

    # ==================== ERROR PAGES ====================
    error_page 429 /429.json;
    location = /429.json {
        return 429 '{"detail":"Terlalu banyak request. Coba lagi nanti."}';
        add_header Content-Type application/json;
    }

    error_page 502 /502.json;
    location = /502.json {
        return 502 '{"detail":"Service tidak tersedia. Coba lagi nanti."}';
        add_header Content-Type application/json;
    }
}
