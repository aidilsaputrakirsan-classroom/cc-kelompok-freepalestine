# Production override — Monolith stack only.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Microservices production: gunakan docker-compose.microservices.prod.yml

services:
  db:
    restart: always
    # Jangan expose database ke host pada production.
    ports: []

  backend:
    restart: always
    environment:
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"

  frontend:
    restart: always
